<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Internship</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

body{
    font-family:Arial;
    background:#f2f2f2;
}

.container{

    width:60%;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;

}

h2{

    text-align:center;
    color:#003366;

}

input,
textarea{

    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;

}

button{

    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;

}

button:hover{

    background:#0055aa;

}

</style>

</head>

<body>

<div class="container">

<h2>Upload New Internship</h2>

<form method="POST">

<label>Internship Title</label>

<input
type="text"
name="title"
required>

<label>Department</label>

<input
type="text"
name="department"
required>

<label>Duration</label>

<input
type="text"
name="duration"
required>

<label>Eligibility</label>

<textarea
name="eligibility"
rows="4"
required></textarea>

<label>Required Skills</label>

<textarea
name="skills"
rows="4"
required></textarea>

<label>Location</label>

<input
type="text"
name="location"
required>

<label>Last Date</label>

<input
type="date"
name="last_date"
required>

<button type="submit">

Upload Internship

</button>

</form>

</div>

</body>

</html>
